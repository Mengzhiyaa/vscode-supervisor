name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit:ext

      - name: Install target binaries
        run: npm run install:binaries -- --retry 3

      - name: Package Linux VSIX smoke artifact
        run: |
          mkdir -p artifacts
          npx vsce package --no-dependencies --target linux-x64 --out artifacts/vscode-supervisor-linux-x64.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-supervisor-linux-x64
          path: artifacts/*.vsix
          retention-days: 14
